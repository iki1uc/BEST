<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BEST · Identität · iki1uc</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
h1 { color:#6cf; }
pre { background:#111; border:1px solid #333; padding:12px; }
canvas { background:#111; border:1px solid #333; margin-top:20px; }
</style>
</head>

<body>

<h1>BEST · Identität</h1>

<pre>
CORE     = iki1uc
VERSION  = 1.0
CODE     = RAW‑BEST
LAGE     = BEST / Score‑System
STATUS   = Aktiv
IDENTITY = Score‑Identität
FORM     = Tetraeder / 4e‑Re
READY    = 100%
</pre>

<canvas id="idCanvas" width="400" height="400"></canvas>

<script>
const c = document.getElementById("idCanvas");
const x = c.getContext("2d");

let t = 0;

function drawID() {
    x.clearRect(0,0,400,400);

    // Tetraeder (4 Punkte)
    const R = 120;
    const pts = [];
    for(let i=0;i<4;i++){
        const a = t + i*Math.PI/2;
        pts.push([200 + Math.cos(a)*R, 200 + Math.sin(a)*R]);
    }

    x.strokeStyle = "#6cf";
    x.lineWidth = 3;
    x.beginPath();
    pts.forEach(([px,py],i)=>{
        if(i===0) x.moveTo(px,py);
        else x.lineTo(px,py);
    });
    x.closePath();
    x.stroke();

    t += 0.02;
    requestAnimationFrame(drawID);
}
drawID();
</script>

</body>
</html>
